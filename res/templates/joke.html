<!DOCTYPE html>
<html lang="en">

<head>

     <meta charset="UTF-8">

     <title>MARK-首页</title>
     <link rel="icon" href="/images/favicon.ico">
     <link rel="stylesheet" href="/css/bootstrap.min.css">
     <link rel="stylesheet" href="/css/animate.css">
     <link rel="stylesheet" href="/css/magnific-popup.css">
     <link rel="stylesheet" href="/css/font-awesome.min.css">

     <!-- Main css -->
     <link rel="stylesheet" href="/css/style.css">

     <style>
          table {
               width: 100%;
               border-collapse: collapse;
               margin-top: 20px;
               font-size: 16px;
          }

          table,
          th,
          td {
               border: 1px solid #ddd;
          }

          th,
          td {
               padding: 12px 20px;
               text-align: left;
          }

          th {
               background-color: #f2f2f2;
               font-weight: bold;
          }

          td {
               background-color: #fafafa;
          }

          tr:nth-child(even) td {
               background-color: #f9f9f9;
          }

          tr:hover td {
               background-color: #e0e0e0;
          }
     </style>
</head>

<body data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

     <!-- PRE LOADER -->
     <div class="preloader">
          <div class="spinner">
               <span class="spinner-rotate"></span>
          </div>
     </div>

     <!-- NAVIGATION SECTION -->
     <div class="navbar custom-navbar navbar-fixed-top" role="navigation">
          <div class="container">

               <div class="navbar-header">
                    <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                         <span class="icon icon-bar"></span>
                         <span class="icon icon-bar"></span>
                         <span class="icon icon-bar"></span>
                    </button>
                    <!-- lOGO TEXT HERE -->
                    <a href="/" class="navbar-brand">Mark</a>
               </div>
               <div class="collapse navbar-collapse">
                    <ul class="nav navbar-nav navbar-right">
                         <li><a class="smoothScroll" href="/">首页</a></li>
                         <li><a class="smoothScroll" href="/picture">图片</a></li>
                         <li><a class="smoothScroll" href="/video">视频</a></li>
                         <li><a class="smoothScroll" href="/login">登录</a></li>
                         <li><a class="smoothScroll" href="/register">注册</a></li>
                    </ul>
               </div>

          </div>
     </div>
     <!-- HOME SECTION -->
     <section id="home">
          <div class="container">
               <div class="row">

                    <div class="col-md-offset-1 col-md-2 col-sm-3">
                         <img src="/images/profile-image.jpg" class="wow fadeInUp img-responsive img-circle"
                              data-wow-delay="0.2s" alt="about image">
                    </div>
                    <div class="col-md-8 col-sm-8">
                         <h1 class="wow fadeInUp" data-wow-delay="0.6s">姓名：{{name}}, 年龄：{{age}}</h1>
                         <h2 class="wow fadeInUp" data-wow-delay="0.6s">家庭住址:</h2>
                         <table class="wow fadeInUp" data-wow-delay="0.6s"
                              style="width: 100%; padding-left: 40px; border-collapse: collapse;">
                              {{#addresses}}
                              <tr>
                                   <td><strong>街道:</strong></td>
                                   <td>{{street}}</td>
                                   <td><strong>城市:</strong></td>
                                   <td>{{city}}</td>
                              </tr>
                              {{/addresses}}
                         </table>
                    </div>
               </div>
          </div>
     </section>
     <!-- SCRIPTS -->
     <script src="/js/jquery.js"></script>
     <script src="/js/bootstrap.min.js"></script>
     <script src="/js/smoothscroll.js"></script>
     <script src="/js/jquery.magnific-popup.min.js"></script>
     <script src="/js/magnific-popup-options.js"></script>
     <script src="/js/wow.min.js"></script>
     <script src="/js/custom.js"></script>
</body>

</html>
